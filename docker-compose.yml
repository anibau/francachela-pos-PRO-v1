# Francachela POS - Docker Compose para Desarrollo
version: '3.8'

services:
  # Base de datos PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: francachela_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: francachela_pos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: francachela123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - francachela_network

  # Redis para cache (opcional)
  redis:
    image: redis:7-alpine
    container_name: francachela_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - francachela_network

  # Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: francachela_api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: francachela123
      DB_DATABASE: francachela_pos
      JWT_SECRET: francachela_jwt_secret_development_only
      JWT_EXPIRES_IN: 1h
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - postgres
      - redis
    volumes:
      - ./uploads:/app/uploads
      - ./sessions:/app/sessions
      - ./logs:/app/logs
    networks:
      - francachela_network

  # Adminer para gestión de BD (opcional)
  adminer:
    image: adminer:latest
    container_name: francachela_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
    networks:
      - francachela_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  francachela_network:
    driver: bridge

