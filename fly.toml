# fly.toml app configuration file generated for francachela-pos-pro-v1 on 2025-12-27T16:02:39Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'francachela-pos-pro-v1'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 3000
  force_https = true

   # 🔴 IMPORTANTE PARA BAILEYS
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[mounts]
  source = "whatsapp_data"
  destination = "/data"

