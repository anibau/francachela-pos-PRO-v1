# fly.toml app configuration file

app = "francachela-pos-pro-v1"
primary_region = "iad"   # ✅ MISMA REGIÓN QUE EL VOLUMEN

[build]

[env]
  NODE_ENV = "production"
  WHATSAPP_AUTH_DIR = "/data/whatsapp-auth"
  TZ = "America/Lima"

[http_service]
  internal_port = 3000
  force_https = true

  # 🔒 CRÍTICO PARA BAILEYS
  auto_stop_machines = false
  auto_start_machines = false
  min_machines_running = 1
  processes = ["app"]

[[mounts]]
  source = "whatsapp_data"
  destination = "/data"

[[vm]]
  memory = "256"
  cpu_kind = "shared"
  cpus = 1
